<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة المرور | Busla</title>
    
    <link rel="icon" type="image/jpg" href="./assets/icons/icon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'b-bg': '#000000', 
                        'b-surface': '#111111', 
                        'b-primary': '#006A67' 
                    },
                    fontFamily: { 'cairo': ['Cairo', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'float': 'float 3s ease-in-out infinite'
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; background-image: url('./assets/images/1.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-b-primary/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-b-primary/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="bg-b-surface border border-white/10 p-8 sm:p-10 rounded-3xl shadow-2xl max-w-md w-full relative z-10 animate-fade-in">
        
        <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-b-primary via-teal-400 to-b-primary"></div>
        
        <div class="text-center mb-8">
            <div class="flex justify-center mb-5 animate-float">
                <div class="relative">
                    <img src="./assets/icons/icon.jpg" alt="Busla Logo" class="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(0,106,103,0.5)] border-2 border-white/10 object-cover" onerror="this.src='https://ui-avatars.com/api/?name=Busla&background=006A67&color=fff'">
                    <div class="absolute -bottom-2 -right-2 w-8 h-8 bg-b-surface rounded-full flex items-center justify-center border border-white/10 text-b-primary text-sm shadow-lg">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                </div>
            </div>
            <h1 class="text-3xl font-black text-white mb-1 tracking-wide">BUSLA</h1>
            <h2 class="text-lg font-bold text-gray-300 mt-4">إعادة تعيين كلمة المرور</h2>
            <p class="text-xs text-gray-500 mt-2 leading-relaxed">الرجاء إدخال كلمة المرور الجديدة لحسابك والتأكد من حفظها في مكان آمن.</p>
        </div>

        <form id="reset-password-form" class="space-y-5">
            <div>
                <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wider">كلمة المرور الجديدة</label>
                <div class="relative group">
                    <input type="password" id="new-password" required minlength="6" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-b-primary focus:ring-1 focus:ring-b-primary outline-none pl-10 transition-all" placeholder="••••••••">
                    <i class="fas fa-lock absolute left-4 top-3.5 text-gray-500 group-focus-within:text-b-primary transition-colors"></i>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-wider">تأكيد كلمة المرور</label>
                <div class="relative group">
                    <input type="password" id="confirm-password" required minlength="6" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-b-primary focus:ring-1 focus:ring-b-primary outline-none pl-10 transition-all" placeholder="••••••••">
                    <i class="fas fa-check-double absolute left-4 top-3.5 text-gray-500 group-focus-within:text-b-primary transition-colors"></i>
                </div>
            </div>

            <div id="error-message" class="hidden text-red-400 text-xs bg-red-500/10 p-3 rounded-lg border border-red-500/20 text-center font-bold flex items-center justify-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span id="error-text"></span>
            </div>

            <button type="submit" id="btn-submit" class="w-full py-3.5 mt-2 bg-gradient-to-r from-b-primary to-teal-700 hover:from-teal-600 hover:to-teal-800 text-white font-bold rounded-xl shadow-lg shadow-b-primary/20 transition-all flex items-center justify-center gap-2 group">
                <i class="fas fa-key group-hover:scale-110 transition-transform"></i> 
                <span>حفظ كلمة المرور الجديدة</span>
            </button>
        </form>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <a href="./pages/auth.html" class="inline-flex items-center justify-center gap-2 text-gray-400 hover:text-white text-sm font-bold transition-colors group">
                <i class="fas fa-arrow-right group-hover:-translate-x-1 transition-transform"></i>
                العودة إلى صفحة الدخول
            </a>
        </div>
    </div>

    <script type="module">
        // تأكد من مسار ملف supabase-config.js (هنا افترضنا أنه في مجلد js)
        import { supabase } from './js/supabase-config.js'; // عدل المسار إذا كان ملف HTML في نفس مجلد JS اجعله './supabase-config.js'

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reset-password-form');
            const newPassInput = document.getElementById('new-password');
            const confirmPassInput = document.getElementById('confirm-password');
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const btnSubmit = document.getElementById('btn-submit');

            function showError(msg) {
                errorText.innerText = msg;
                errorDiv.classList.remove('hidden');
                errorDiv.classList.add('animate-pulse');
                setTimeout(() => errorDiv.classList.remove('animate-pulse'), 500);
            }

            // التحقق من وجود توكن استعادة كلمة المرور في الرابط
            if (!window.location.hash.includes('type=recovery')) {
                showError("الرابط غير صالح أو منتهي الصلاحية. يرجى طلب رابط جديد.");
                btnSubmit.disabled = true;
                btnSubmit.classList.add('opacity-50', 'cursor-not-allowed', 'grayscale');
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.classList.add('hidden');

                const newPassword = newPassInput.value;
                const confirmPassword = confirmPassInput.value;

                if (newPassword !== confirmPassword) {
                    showError("كلمات المرور غير متطابقة!");
                    return;
                }

                if (newPassword.length < 6) {
                    showError("كلمة المرور يجب أن تتكون من 6 أحرف على الأقل.");
                    return;
                }

                const originalBtnContent = btnSubmit.innerHTML;
                btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>جاري التحديث...</span>';
                btnSubmit.disabled = true;

                try {
                    // تحديث كلمة المرور في سوبابيز
                    const { error } = await supabase.auth.updateUser({
                        password: newPassword
                    });

                    if (error) throw error;

                    // نجاح العملية
                    btnSubmit.innerHTML = '<i class="fas fa-check-circle text-xl"></i> <span>تم التحديث بنجاح!</span>';
                    btnSubmit.className = "w-full py-3.5 mt-2 bg-green-600 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2";
                    
                    newPassInput.disabled = true;
                    confirmPassInput.disabled = true;

                    // الانتقال لصفحة تسجيل الدخول بعد ثانيتين
                    setTimeout(() => {
                        window.location.href = './pages/auth.html'; 
                    }, 2000);

                } catch (error) {
                    console.error("Password Update Error:", error);
                    showError(error.message || "حدث خطأ أثناء التحديث.");
                    btnSubmit.innerHTML = originalBtnContent;
                    btnSubmit.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
