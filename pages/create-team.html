<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء فريق | بوصلة</title>
    <link rel="icon" type="image/jpg" href="../assets/icons/icon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'b-bg': '#000000', 'b-surface': '#111111', 'b-primary': '#006A67' },
                    fontFamily: { 'cairo': ['Cairo', 'sans-serif'] },
                    animation: {
                        'slide-in': 'slideIn 0.3s ease-out',
                        'fade-out': 'fadeOut 0.3s ease-in forwards'
                    },
                    keyframes: {
                        slideIn: {
                            '0%': { transform: 'translateY(-20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeOut: {
                            '0%': { opacity: '1' },
                            '100%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #006A67; }
    </style>
</head>
<body class="bg-b-bg text-white min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] right-[-5%] w-96 h-96 bg-b-primary/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-2xl bg-b-surface p-8 rounded-2xl border border-white/10 shadow-2xl relative backdrop-blur-sm animate-slide-in">
        
        <a href="student-dash.html" class="absolute top-6 left-6 text-gray-400 hover:text-white transition-colors p-2 hover:bg-white/5 rounded-full">
            <i class="fas fa-arrow-left text-xl"></i>
        </a>

        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-br from-b-primary to-teal-800 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-b-primary/20 rotate-3 hover:rotate-0 transition-transform duration-300">
                <i class="fas fa-users-cog text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold mb-2">تأسيس فريق أكاديمي</h1>
            <p class="text-gray-400">ابدأ رحلتك كقائد، واجمع زملاءك للتعلم والمنافسة معاً.</p>
        </div>

        <form id="create-team-form" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group">
                    <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-b-primary transition-colors">
                        <i class="fas fa-signature ml-1"></i> اسم الفريق
                    </label>
                    <input type="text" id="team-name" required placeholder="مثال: Digital Minds" 
                           class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-b-primary focus:ring-1 focus:ring-b-primary transition-all placeholder-gray-600">
                </div>
                <div class="group">
                    <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-purple-400 transition-colors">
                        <i class="fas fa-image ml-1"></i> رابط الشعار (اختياري)
                    </label>
                    <input type="url" id="team-logo" placeholder="https://imgur.com/..." 
                           class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder-gray-600">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="group">
                    <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-b-primary transition-colors">
                        <i class="fas fa-university ml-1"></i> الجامعة
                    </label>
                    <input type="text" id="uni-name" required placeholder="مثال: جامعة الزقازيق" 
                           class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-b-primary focus:ring-1 focus:ring-b-primary transition-all placeholder-gray-600">
                </div>
                <div class="group">
                    <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-b-primary transition-colors">
                        <i class="fas fa-map-marker-alt ml-1"></i> المحافظة
                    </label>
                    <select id="gov-name" required class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-b-primary focus:ring-1 focus:ring-b-primary transition-all cursor-pointer appearance-none">
                        <option value="" disabled selected>اختر المحافظة</option>
                        <option value="Cairo">القاهرة</option>
                        <option value="Giza">الجيزة</option>
                        <option value="Alexandria">الإسكندرية</option>
                        <option value="Sharqia">الشرقية</option>
                        <option value="Dakahlia">الدقهلية</option>
                        <option value="Other">أخرى</option>
                    </select>
                </div>
            </div>

            <div class="group">
                <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-b-primary transition-colors">
                    <i class="fas fa-users ml-1"></i> عدد الأعضاء المتوقع (شاملاً القائد)
                </label>
                <input type="number" id="members-count" max="5" min="2" required placeholder="الحد الأقصى 5" 
                       class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-b-primary focus:ring-1 focus:ring-b-primary transition-all placeholder-gray-600">
            </div>

            <div class="group">
                <label class="block text-sm text-gray-400 mb-2 group-focus-within:text-b-primary transition-colors">
                    <i class="fas fa-comment-alt ml-1"></i> لماذا تريد إنشاء الفريق؟
                </label>
                <textarea id="reason" rows="3" required placeholder="اكتب نبذة مختصرة عن هدفك لتسريع الموافقة..." 
                          class="w-full bg-black/50 border border-white/10 rounded-xl p-3.5 text-white outline-none focus:border-b-primary focus:ring-1 focus:ring-b-primary transition-all placeholder-gray-600 resize-none"></textarea>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-b-primary to-teal-700 hover:from-teal-600 hover:to-teal-800 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-b-primary/20 transition-all transform hover:scale-[1.01] active:scale-[0.99] flex items-center justify-center gap-3">
                <span>إرسال الطلب للمراجعة</span>
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <div id="toast-container" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-3 w-full max-w-md pointer-events-none">
        </div>

    <script type="module" src="../js/create-team.js"></script>
</body>
</html>
