<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busla Admin Panel</title>
    <link rel="icon" type="image/jpg" href="../assets/icons/icon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'b-bg': '#000000', 'b-surface': '#111111', 'b-primary': '#006A67', 'b-accent': '#FFC107' },
                    fontFamily: { 'cairo': ['Cairo', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-b-surface border-l border-white/10 flex flex-col h-full z-50 shrink-0">
        <div class="p-6 border-b border-white/10 text-center">
            <h2 class="text-2xl font-black text-white tracking-wide">بوصــــلة</h2>
            <p class="text-xs text-b-primary font-bold mt-1 uppercase tracking-widest">Admin Control Center</p>
        </div>

        <nav id="admin-nav" class="flex-1 p-4 space-y-2 overflow-y-auto custom-scroll">
            <button data-target="dashboard" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl bg-b-primary/10 text-b-primary font-bold transition-all">
                <i class="fas fa-chart-line"></i> <span>نظرة عامة</span>
            </button>
            
            <button data-target="content-mgmt" data-perm="manage_content" class="nav-btn hidden w-full flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-white/5 transition-all">
                <i class="fas fa-photo-video"></i> <span>إدارة المحتوى</span>
            </button>

            <button data-target="team-requests" data-perm="manage_requests" class="nav-btn hidden w-full flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-white/5 transition-all">
                <i class="fas fa-user-shield"></i> <span>طلبات الفرق</span>
            </button>

            <button data-target="project-audit" data-perm="audit_projects" class="nav-btn hidden w-full flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-white/5 transition-all">
                <i class="fas fa-check-double"></i> <span>إشراف المشاريع</span>
            </button>

            <button data-target="users-mgmt" data-perm="manage_users" class="nav-btn hidden w-full flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-white/5 transition-all">
                <i class="fas fa-users-cog"></i> <span>إدارة الحسابات</span>
            </button>
        </nav>

        <div class="p-4 border-t border-white/10">
            <div class="flex items-center gap-3 mb-4 px-2">
                <div class="w-10 h-10 rounded-full bg-b-primary/20 flex items-center justify-center text-b-primary border border-b-primary/30">
                    <i class="fas fa-user-secret"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="admin-name" class="text-sm font-bold text-white truncate">جاري التحميل...</p>
                    <p id="admin-role-badge" class="text-[10px] text-gray-400 font-mono">---</p>
                </div>
            </div>
            <button id="logout-btn" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl text-red-400 hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all font-bold text-sm">
                <i class="fas fa-sign-out-alt"></i> تسجيل خروج
            </button>
        </div>
    </aside>

    <main class="flex-1 h-full overflow-y-auto bg-black p-8 custom-scroll relative">
        <section id="dashboard" class="tab-content active space-y-6">
            <h1 class="text-3xl font-black text-white mb-2">لوحة التحكم المركزية</h1>
            <p class="text-gray-400">مرحباً بك في مركز إدارة منصة بوصلة.</p>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-8">
                <div class="bg-b-surface p-6 rounded-2xl border border-white/10"><h3 class="text-gray-400 text-sm">إجمالي الطلاب</h3><p class="text-3xl font-bold mt-2">--</p></div>
                <div class="bg-b-surface p-6 rounded-2xl border border-white/10"><h3 class="text-gray-400 text-sm">إجمالي الفرق</h3><p class="text-3xl font-bold mt-2">--</p></div>
                <div class="bg-b-surface p-6 rounded-2xl border border-white/10"><h3 class="text-gray-400 text-sm">طلبات معلقة</h3><p class="text-3xl font-bold mt-2 text-yellow-500">--</p></div>
            </div>
        </section>

        <section id="content-mgmt" class="tab-content space-y-6">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-white"><i class="fas fa-photo-video text-b-primary ml-2"></i> إدارة المحتوى</h1>
                <button id="btn-import-yt" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-all shadow-lg">
                    <i class="fab fa-youtube"></i> استيراد من يوتيوب
                </button>
            </div>
            
            <div class="flex gap-2 border-b border-white/10 pb-4 mb-6 overflow-x-auto custom-scroll">
                <button class="content-tab-btn active px-4 py-2 bg-white/10 text-white rounded-lg text-sm font-bold" data-target="phases-table">المراحل (Phases)</button>
                <button class="content-tab-btn px-4 py-2 text-gray-400 hover:text-white rounded-lg text-sm font-bold" data-target="courses-table">الكورسات</button>
                <button class="content-tab-btn px-4 py-2 text-gray-400 hover:text-white rounded-lg text-sm font-bold" data-target="videos-table">الفيديوهات</button>
                <button class="content-tab-btn px-4 py-2 text-gray-400 hover:text-white rounded-lg text-sm font-bold" data-target="quizzes-table">الكويزات</button>
                <button class="content-tab-btn px-4 py-2 text-gray-400 hover:text-white rounded-lg text-sm font-bold" data-target="projects-table">المشاريع</button>
            </div>

            <div class="mb-6 relative w-full max-w-md">
                <input type="text" id="content-search" placeholder="ابحث بالاسم أو المعرف..." class="w-full bg-b-surface border border-white/10 rounded-xl py-3 px-4 pr-10 text-white focus:border-b-primary outline-none text-sm">
                <i class="fas fa-search absolute left-4 top-3.5 text-gray-500"></i>
            </div>

            <div class="bg-b-surface rounded-2xl border border-white/10 overflow-hidden shadow-2xl">
                <table class="w-full text-right">
                    <thead class="bg-black/40 text-gray-400 text-xs uppercase tracking-wider border-b border-white/10">
                        <tr>
                            <th class="p-4">المعرف (ID)</th>
                            <th class="p-4">العنوان</th>
                            <th class="p-4">التابع لـ</th>
                            <th class="p-4 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="content-table-body" class="divide-y divide-white/5 text-sm">
                        <tr><td colspan="4" class="p-8 text-center text-gray-500">جاري التحميل...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        </main>

    <div id="toast-container" class="fixed top-6 left-6 z-[999] flex flex-col gap-3 pointer-events-none"></div>
    <div id="confirm-modal" class="fixed inset-0 bg-black/90 hidden z-[999] flex items-center justify-center p-4 backdrop-blur-sm">
        </div>

    <script type="module" src="../js/admin-dash.js"></script>
</body>
</html>
